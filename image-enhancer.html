<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Image Enhancer - ToolHub</title>

<style>
body{
font-family:Arial;
background:#f4f7fc;
padding:20px;
text-align:center;
}

.container{
max-width:800px;
margin:auto;
background:white;
padding:30px;
border-radius:15px;
box-shadow:0 5px 20px rgba(0,0,0,0.1);
}

input,button{
margin-top:15px;
padding:12px;
}

button{
background:#2563eb;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
margin:5px;
}

img{
max-width:100%;
margin-top:20px;
border-radius:10px;
}

canvas{
display:none;
}
</style>
</head>

<body>

<div class="container">

<h1>✨ Image Enhancer</h1>

<p>Improve brightness, contrast and sharpness instantly</p>

<input type="file" id="fileInput" accept="image/*">

<br>

<button onclick="loadImage()">Load Image</button>
<button onclick="enhanceImage()">Enhance</button>

<br>

<img id="preview">

<canvas id="canvas"></canvas>

<a id="download" style="display:none;" download="enhanced.png">Download Image</a>

</div>

<script>

let img = new Image();
let canvas = document.getElementById("canvas");
let ctx = canvas.getContext("2d");

function loadImage(){

const file=document.getElementById("fileInput").files[0];

if(!file){
alert("Select image");
return;
}

img.src=URL.createObjectURL(file);

img.onload=()=>{

document.getElementById("preview").src=img.src;

};

}

function enhanceImage(){

if(!img.src){
alert("Load image first");
return;
}

canvas.width=img.width;
canvas.height=img.height;

ctx.filter="contrast(130%) brightness(115%) saturate(120%)";

ctx.drawImage(img,0,0);

const enhanced=canvas.toDataURL("image/png");

document.getElementById("preview").src=enhanced;

const dl=document.getElementById("download");
dl.href=enhanced;
dl.style.display="inline-block";
dl.innerText="⬇ Download Enhanced Image";

}

</script>

</body>
</html>
