<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QR Code Generator - ToolHub</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f4f7fc;
padding:20px;
}

.container{
max-width:800px;
margin:auto;
background:#fff;
padding:30px;
border-radius:15px;
box-shadow:0 5px 20px rgba(0,0,0,0.1);
text-align:center;
}

h1{
color:#111827;
margin-bottom:10px;
}

p{
color:#666;
margin-bottom:20px;
}

input{
width:100%;
padding:14px;
border:1px solid #ddd;
border-radius:10px;
font-size:16px;
margin-bottom:15px;
}

button{
background:#2563eb;
color:white;
border:none;
padding:12px 25px;
border-radius:8px;
cursor:pointer;
font-size:16px;
}

button:hover{
background:#1d4ed8;
}

#qrcode{
margin-top:30px;
display:flex;
justify-content:center;
}

.download-btn{
display:none;
margin-top:20px;
background:#22c55e;
color:white;
padding:12px 20px;
text-decoration:none;
border-radius:8px;
display:inline-block;
}
</style>
</head>
<body>

<div class="container">

<h1>📱 QR Code Generator</h1>

<p>Generate QR codes instantly from text, links, phone numbers and more.</p>

<input
type="text"
id="qrText"
placeholder="Enter URL or text here..."
>

<button onclick="generateQR()">Generate QR Code</button>

<div id="qrcode"></div>

</div>

<script>

function generateQR(){

const text=document.getElementById("qrText").value;

if(!text){
alert("Please enter text or URL");
return;
}

document.getElementById("qrcode").innerHTML="";

new QRCode(document.getElementById("qrcode"),{
text:text,
width:250,
height:250
});

}

</script>

</body>
</html>
