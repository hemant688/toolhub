<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Image to Text (OCR) - ToolHub</title>

<script src="https://unpkg.com/tesseract.js@5/dist/tesseract.min.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f4f7fc;
padding:20px;
}

.container{
max-width:900px;
margin:auto;
background:white;
padding:30px;
border-radius:20px;
box-shadow:0 10px 30px rgba(0,0,0,.08);
}

h1{
text-align:center;
margin-bottom:10px;
color:#111827;
}

.subtitle{
text-align:center;
color:#666;
margin-bottom:30px;
}

.upload-box{
border:3px dashed #2563eb;
padding:30px;
text-align:center;
border-radius:15px;
background:#f8fbff;
margin-bottom:20px;
}

button{
width:100%;
padding:14px;
background:#2563eb;
color:white;
border:none;
border-radius:10px;
cursor:pointer;
font-weight:bold;
margin-top:15px;
}

#status{
margin-top:20px;
text-align:center;
font-weight:bold;
}

textarea{
width:100%;
height:250px;
margin-top:20px;
padding:15px;
border:1px solid #ddd;
border-radius:10px;
resize:vertical;
}

</style>
</head>

<body>

<div class="container">

<h1>📝 Image to Text (OCR)</h1>

<p class="subtitle">
Extract text from JPG, PNG and other images.
</p>

<div class="upload-box">

<input
type="file"
id="imageInput"
accept="image/*"
>

</div>

<button onclick="extractText()">
Extract Text
</button>

<div id="status"></div>

<textarea
id="result"
placeholder="Extracted text will appear here..."
></textarea>

<script>

async function extractText(){

const file =
document.getElementById("imageInput").files[0];

if(!file){

alert("Please upload an image.");

return;

}
  const status =
document.getElementById("status");

const result =
document.getElementById("result");

status.innerHTML =
"⏳ Extracting text... Please wait.";

result.value = "";

try{

const {
data:{ text }
} = await Tesseract.recognize(
file,
"eng",
{
logger: m => {
status.innerHTML =
"⏳ " + Math.round(m.progress * 100) + "% Processing...";
}
}
);

result.value = text;

status.innerHTML =
"✅ Text extracted successfully.";

}
catch(error){

console.error(error);

status.innerHTML =
"❌ Error extracting text.";

}

}
  </script>

</div>

</body>
</html>
