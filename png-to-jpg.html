```html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PNG to JPG Converter - ToolHub</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f5f7fb;
padding:20px;
}

.container{
max-width:1000px;
margin:auto;
background:white;
padding:30px;
border-radius:15px;
box-shadow:0 4px 15px rgba(0,0,0,.1);
text-align:center;
}

h1{
color:#111827;
margin-bottom:10px;
}

p{
color:#666;
margin-bottom:20px;
}

.preview-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
margin-top:25px;
}

.card{
border:1px solid #ddd;
border-radius:12px;
padding:15px;
}

.card img{
max-width:100%;
height:auto;
border-radius:8px;
}

.btn{
display:inline-block;
padding:10px 18px;
background:#2563eb;
color:white;
text-decoration:none;
border-radius:8px;
margin-top:12px;
}

.btn:hover{
background:#1d4ed8;
}

.back{
display:inline-block;
margin-top:25px;
text-decoration:none;
color:#2563eb;
}

input{
margin:20px 0;
}

</style>
</head>
<body>

<div class="container">

<h1>🖼 PNG to JPG Converter</h1>

<p>Convert PNG images into high-quality JPG instantly.</p>

<input type="file"
id="pngInput"
accept=".png,image/png"
multiple>

<div id="previewGrid" class="preview-grid"></div>

<a href="index.html" class="back">
⬅ Back to Home
</a>

</div>

<script>

const pngInput =
document.getElementById("pngInput");

const previewGrid =
document.getElementById("previewGrid");

pngInput.addEventListener("change",()=>{

previewGrid.innerHTML="";

Array.from(pngInput.files).forEach((file,index)=>{

const reader = new FileReader();

reader.onload = function(e){

const img = new Image();

img.onload = function(){

const canvas =
document.createElement("canvas");

const ctx =
canvas.getContext("2d");

canvas.width = img.width;
canvas.height = img.height;

/* White background for transparent PNG */

ctx.fillStyle="#ffffff";
ctx.fillRect(
0,
0,
canvas.width,
canvas.height
);

ctx.drawImage(img,0,0);

const jpgData =
canvas.toDataURL(
"image/jpeg",
1.0
);

const card =
document.createElement("div");

card.className="card";

const preview =
document.createElement("img");

preview.src = jpgData;

const download =
document.createElement("a");

download.className="btn";
download.textContent="Download JPG";
download.href=jpgData;
download.download=
"toolhub-image-"+(index+1)+".jpg";

card.appendChild(preview);
card.appendChild(download);

previewGrid.appendChild(card);

};

img.src=e.target.result;

};

reader.readAsDataURL(file);

});

});

</script>

</body>
</html>
